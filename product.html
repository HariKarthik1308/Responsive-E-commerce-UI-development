<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>

    <link rel="stylesheet" href="styles/main.css">

    <style>
        .product-details{
            padding:50px;
            display:flex;
            gap:40px;
            flex-wrap:wrap;
        }

        .product-image{
            flex:1;
            min-width:300px;
        }

        .product-image img{
            width:100%;
            max-height:500px;
            object-fit:contain;
        }

        .product-info-detail{
            flex:1;
            min-width:300px;
        }

        .product-info-detail h2{
            margin-bottom:20px;
        }

        .product-info-detail p{
            margin-bottom:20px;
            line-height:1.6;
        }

        .detail-price{
            color:#007bff;
            font-size:28px;
            font-weight:bold;
        }

        .detail-btn{
            padding:12px 25px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div id="productDetails">
    <h2 style="text-align:center;padding:50px;">
        Loading Product...
    </h2>
</div>

<script src="scripts/product.js"></script>

</body>
</html>
